<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Game</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Game Styles -->
<link rel="stylesheet" href="../styles/game-style.css">

<style>

body{
background:#111;
}

canvas{
background:black;
border-radius:10px;
border:4px solid #28a745;
box-shadow:0 0 20px #28a745;
}

</style>

</head>

<body class="text-white">

<div class="container text-center mt-5 game-container">

<h1 class="mb-4 display-4">🐍 Snake Arcade</h1>

<!-- Scoreboard -->
<div class="row justify-content-center mb-4">

<div class="col-md-2 col-6 mb-2">
<div class="card bg-success text-white shadow">
<div class="card-body">
<h6>Score</h6>
<h4 id="score">0</h4>
</div>
</div>
</div>

<div class="col-md-2 col-6 mb-2">
<div class="card bg-warning text-dark shadow">
<div class="card-body">
<h6>High Score</h6>
<h4 id="highScore">0</h4>
</div>
</div>
</div>

<div class="col-md-2 col-6 mb-2">
<div class="card bg-info text-dark shadow">
<div class="card-body">
<h6>Level</h6>
<h4 id="level">1</h4>
</div>
</div>
</div>

<div class="col-md-2 col-6 mb-2">
<div class="card bg-danger text-white shadow">
<div class="card-body">
<h6>Status</h6>
<h5 id="status">Ready</h5>
</div>
</div>
</div>

</div>

<!-- Game Canvas -->
<div class="d-flex justify-content-center">

<canvas id="gameCanvas" width="420" height="420"></canvas>

</div>

<!-- Game Controls -->
<div class="mt-4">

<button class="btn btn-success me-2" onclick="startGame()">Start</button>

<button class="btn btn-warning me-2" onclick="pauseGame()">Pause</button>

<button class="btn btn-danger me-2" onclick="restartGame()">Restart</button>

<a href="../index.html" class="btn btn-secondary">⬅ Back</a>

</div>

<!-- Speed Selector -->
<div class="mt-4">

<label class="form-label">Game Speed</label>

<select class="form-select w-25 mx-auto" id="speedSelect">

<option value="150">Slow</option>
<option value="100" selected>Normal</option>
<option value="60">Fast</option>
<option value="40">Extreme</option>

</select>

</div>

<!-- Controls Info -->
<div class="mt-4">

<div class="alert alert-dark w-50 mx-auto">

<h6>Controls</h6>

⬆ Arrow Up = Move Up<br>
⬇ Arrow Down = Move Down<br>
⬅ Arrow Left = Move Left<br>
➡ Arrow Right = Move Right

</div>

</div>

</div>

<!-- Snake Script -->
<script src="../scripts/snake.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
