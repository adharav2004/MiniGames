<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Whack-a-Mole</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Game CSS -->
<link rel="stylesheet" href="../styles/game-style.css">

<script defer src="../scripts/mole.js"></script>

<style>

body{
background:#111;
color:white;
text-align:center;
}

/* Grid Layout */

.mole-grid{
display:grid;
grid-template-columns:repeat(4,90px);
gap:15px;
justify-content:center;
margin-top:20px;
}

/* Hole */

.mole-grid div{
width:90px;
height:90px;
background:#333;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
transition:0.2s;
}

.mole-grid div:hover{
background:#444;
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">🐹 Whack-a-Mole</h1>

<!-- Scoreboard -->

<div class="row justify-content-center mb-4">

<div class="col-md-2 col-6 mb-2">
<div class="card bg-success text-white">
<div class="card-body">
<h6>Score</h6>
<h3 id="score">0</h3>
</div>
</div>
</div>

<div class="col-md-2 col-6 mb-2">
<div class="card bg-warning text-dark">
<div class="card-body">
<h6>High Score</h6>
<h3 id="highScore">0</h3>
</div>
</div>
</div>

<div class="col-md-2 col-6 mb-2">
<div class="card bg-danger text-white">
<div class="card-body">
<h6>Time</h6>
<h3 id="timer">30</h3>
</div>
</div>
</div>

</div>

<!-- Game Controls -->

<div class="mb-3">

<button class="btn btn-success me-2" onclick="startGame()">▶ Start Game</button>

<button class="btn btn-danger" onclick="restartGame()">🔄 Restart</button>

</div>

<!-- Status -->

<h4 id="status">Click Start to Play</h4>

<!-- Mole Grid -->

<div class="mole-grid" id="moleGrid"></div>

<br>

<a href="../index.html" class="btn btn-secondary">⬅ Back to Arcade</a>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
