<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rock Paper Scissors</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Game CSS -->
<link rel="stylesheet" href="../styles/game-style.css">

<script defer src="../scripts/rps.js"></script>

<style>

body{
background:#111;
color:white;
text-align:center;
}

.game-btn{
font-size:45px;
padding:20px 30px;
margin:10px;
border-radius:15px;
border:none;
background:#222;
color:white;
transition:0.2s;
}

.game-btn:hover{
transform:scale(1.2);
background:#444;
box-shadow:0 0 15px #00ffcc;
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">✊📄✂️ Rock Paper Scissors</h1>

<!-- Scoreboard -->

<div class="row justify-content-center mb-4">

<div class="col-md-2 col-6 mb-2">
<div class="card bg-primary text-white">
<div class="card-body">
<h6>Player 1</h6>
<h3 id="playerScore">0</h3>
</div>
</div>
</div>

<div class="col-md-2 col-6 mb-2">
<div class="card bg-danger text-white">
<div class="card-body">
<h6>Player 2 / CPU</h6>
<h3 id="computerScore">0</h3>
</div>
</div>
</div>

</div>

<!-- Mode Selection -->

<div class="mb-4">

<button class="btn btn-success me-2" onclick="setMode('cpu')">
🤖 Player vs Computer
</button>

<button class="btn btn-warning" onclick="setMode('pvp')">
👥 Player vs Player
</button>

</div>

<!-- Game Buttons -->

<div id="buttons">

<button class="game-btn" onclick="play('rock')">✊</button>

<button class="game-btn" onclick="play('paper')">📄</button>

<button class="game-btn" onclick="play('scissors')">✂️</button>

</div>

<!-- Result Display -->

<h3 id="result" class="mt-4">
Choose Rock, Paper or Scissors
</h3>

<!-- Game Buttons -->

<div class="mt-4">

<button class="btn btn-success me-2" onclick="resetGame()">
🔄 Restart Game
</button>

<a href="../index.html" class="btn btn-secondary">
⬅ Back to Arcade
</a>

</div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
